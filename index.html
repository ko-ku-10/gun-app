<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Friends Battle</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #121212; color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        .status-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #1a1a1a;
            border-bottom: 3px solid #333;
        }
        .hp-label { font-size: 0.9rem; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        .hp-bar-outer { width: 85%; height: 30px; background: #333; border-radius: 15px; overflow: hidden; border: 2px solid #555; }
        #hp_inner { width: 100%; height: 100%; background: #2ecc71; transition: width 0.2s; }
        .ammo-display { font-size: 4rem; font-weight: bold; color: #007AFF; margin: 10px 0; text-shadow: 0 0 15px rgba(0,122,255,0.5); }
        
        .control-panel {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 60vh; gap: 12px; padding: 15px; background: #121212;
        }
        button {
            border: none; border-radius: 25px; font-size: 1.4rem; font-weight: bold;
            color: white; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .fire { background: #e74c3c; grid-column: span 2; font-size: 2.5rem; }
        .fire:disabled { background: #555; opacity: 0.5; }
        .reload { background: #27ae60; }
        .mode { background: #2980b9; }
        button:active:not(:disabled) { opacity: 0.8; transform: translateY(2px); }

        #menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .id-box { font-size: 3rem; color: #f1c40f; font-weight: bold; background: #333; padding: 10px 30px; border-radius: 15px; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: 2px solid #007AFF; text-align: center; width: 180px; background: #000; color: #fff; }
        
        .damaged { animation: shake 0.2s ease-in-out; background-color: #500 !important; }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>

<div id="menu">
    <h2>BATTLE READY</h2>
    <p style="color:#888;">あなたの4桁ID</p>
    <div id="display_id" class="id-box">----</div>
    <input type="number" id="input_id" placeholder="相手のID">
    <button onclick="connectPeer()" style="background:#27ae60; padding:15px 30px; border-radius:15px; border:none; color:white; font-weight:bold;">相手と接続</button>
    <button onclick="closeMenu()" style="padding:15px; background:#444; border:none; color:#fff; border-radius:10px;">1人で練習</button>
</div>

<div class="status-area">
    <div class="hp-label">TEAM HP</div>
    <div class="hp-bar-outer"><div id="hp_inner"></div></div>
    <div class="ammo-display" id="ammo_text">12 / 12</div>
    <div id="mode_text" style="color:#888; font-weight:bold;">SEMI-AUTO</div>
</div>

<div class="control-panel">
    <button class="fire" id="btn_fire">FIRE</button>
    <button class="mode" onclick="toggleMode()">MODE</button>
    <button class="reload" id="btn_reload" onclick="doReload()">RELOAD</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    let ammo = 12;
    let hp = 100;
    let isFullAuto = false;
    let isReloading = false; // リロード中フラグ
    let connection = null;
    let autoInterval = null;

    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myId);

    peer.on('open', id => document.getElementById('display_id').innerText = id);
    peer.on('error', err => { if (err.type === 'unavailable-id') location.reload(); });
    peer.on('connection', conn => { 
        connection = conn; 
        initChat(); 
        alert("接続されました！"); 
        closeMenu(); 
    });

    function connectPeer() {
        const tid = document.getElementById('input_id').value;
        if (tid) { connection = peer.connect(tid); initChat(); closeMenu(); }
    }

    function initChat() {
        connection.on('data', data => { if (data === 'HIT') receiveHit(); });
    }

    function closeMenu() {
        audioCtx.resume();
        document.getElementById('menu').style.display = 'none';
        loadAllSounds();
    }

    function receiveHit() {
        hp -= 10;
        if (hp < 0) hp = 0;
        document.getElementById('hp_inner').style.width = hp + "%";
        document.body.classList.add('damaged');
        setTimeout(() => document.body.classList.remove('damaged'), 200);
        if (hp <= 0) { alert("GAME OVER"); location.reload(); }
    }

    async function loadAllSounds() {
        const files = { shot: 'shot.mp3', reload: 'reload.mp3', ready: 'ready.mp3', empty: 'empty.mp3' };
        for (let key in files) {
            try {
                const res = await fetch(files[key]);
                const buffer = await res.arrayBuffer();
                sounds[key] = await audioCtx.decodeAudioData(buffer);
            } catch (e) {}
        }
    }

    function play(key) {
        if (!sounds[key]) return;
        const s = audioCtx.createBufferSource();
        s.buffer = sounds[key];
        s.connect(audioCtx.destination);
        s.start(0);
    }

    function fire() {
        if (isReloading) return; // リロード中は何もしない
        if (ammo > 0) {
            play('shot');
            ammo--;
            if (connection && connection.open) connection.send('HIT');
            updateUI();
        } else {
            stopAutoFire(); // 弾が切れたら連射停止
            play('empty');
        }
    }

    const fireBtn = document.getElementById('btn_fire');
    fireBtn.addEventListener('pointerdown', e => {
        e.preventDefault();
        if (isReloading) return;
        fire();
        if (isFullAuto && ammo > 0) autoInterval = setInterval(fire, 150);
    });

    const stopAutoFire = () => { clearInterval(autoInterval); autoInterval = null; };
    window.addEventListener('pointerup', stopAutoFire);
    window.addEventListener('pointercancel', stopAutoFire);

    function toggleMode() {
        if (isReloading) return;
        isFullAuto = !isFullAuto;
        play('ready');
        document.getElementById('mode_text').innerText = isFullAuto ? "FULL-AUTO" : "SEMI-AUTO";
    }

    function doReload() {
        if (isReloading || ammo === 12) return;
        
        isReloading = true;
        stopAutoFire(); // 連射を強制停止
        document.getElementById('btn_fire').disabled = true;
        
        play('reload');
        
        setTimeout(() => {
            play('ready');
            ammo = 12;
            isReloading = false;
            document.getElementById('btn_fire').disabled = false;
            updateUI();
        }, 1000); // 1秒リロード
    }

    function updateUI() {
        document.getElementById('ammo_text').innerText = ammo + " / 12";
    }
</script>
</body>
</html>
