<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gun Button Sim</title>
    <style>
        /* 画面の基本設定：横持ちを想定 */
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a; color: white;
            font-family: sans-serif;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
            user-select: none;
        }

        /* 弾数表示エリア */
        .info-panel {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: linear-gradient(to bottom, #222, #1a1a1a);
        }
        .ammo { font-size: 4rem; font-weight: bold; color: #007AFF; }
        .status { font-size: 1.2rem; color: #888; }

        /* ボタン配置：スマホの両端に配置するイメージ */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 左右2分割 */
            height: 60vh; /* 画面の下半分以上をボタンにする */
            gap: 10px; padding: 10px;
        }

        button {
            border: none; border-radius: 15px;
            font-size: 1.5rem; font-weight: bold; color: white;
            transition: transform 0.1s, opacity 0.1s;
            -webkit-tap-highlight-color: transparent; /* タップ時の青枠を消す */
        }

        button:active { transform: scale(0.95); opacity: 0.8; }

        /* 各ボタンの色分け */
        .btn-shot { background-color: #e74c3c; grid-row: span 1; } /* 発射：赤 */
        .btn-empty { background-color: #555; }                   /* 空撃ち（確認用） */
        .btn-reload { background-color: #2ecc71; }                /* リロード：緑 */
        .btn-ready { background-color: #f1c40f; }                 /* 構え/安全：黄 */

        /* 初期画面 */
        #setup_screen {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        #start_btn { padding: 20px 40px; font-size: 1.5rem; background: #007AFF; border-radius: 50px; border: none; color: white; }
    </style>
</head>
<body>

    <div id="setup_screen">
        <button id="start_btn">タップして起動</button>
    </div>

    <div class="info-panel">
        <div class="ammo" id="ammo_count">10 / 10</div>
        <div class="status" id="action_label">READY</div>
    </div>

    <div class="controls">
        <button class="btn-shot" onclick="triggerShot()">FIRE<br>(発射)</button>
        <button class="btn-reload" onclick="triggerReload()">RELOAD<br>(装填)</button>
        <button class="btn-ready" onclick="triggerReady()">SET<br>(構え)</button>
        <button class="btn-empty" onclick="triggerEmpty()">EMPTY<br>(空撃ち)</button>
    </div>

    <script>
        // 音声ファイルの読み込み（前の手順でアップしたファイル名）
        const sounds = {
            shot: new Audio('shot.mp3'),
            reload: new Audio('reload.mp3'),
            ready: new Audio('ready.mp3'),
            empty: new Audio('empty.mp3')
        };

        let ammo = 10;

        // 起動ボタン
        document.getElementById('start_btn').addEventListener('click', () => {
            // 音声のブラウザロック解除
            Object.values(sounds).forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(()=>{});
            });
            document.getElementById('setup_screen').style.display = 'none';
        });

        function updateDisplay(text) {
            document.getElementById('action_label').innerText = text;
            document.getElementById('ammo_count').innerText = ammo + " / 10";
        }

        // 1. 発射
        function triggerShot() {
            if (ammo > 0) {
                playSound('shot');
                ammo--;
                updateDisplay("BANG!");
            } else {
                playSound('empty');
                updateDisplay("OUT OF AMMO");
            }
        }

        // 2. リロード
        function triggerReload() {
            playSound('reload');
            updateDisplay("RELOADING...");
        }

        // 3. 構え（リロード完了・弾数回復）
        function triggerReady() {
            playSound('ready');
            ammo = 10;
            updateDisplay("READY");
        }

        // 4. 空撃ち（手動で鳴らしたい場合）
        function triggerEmpty() {
            playSound('empty');
            updateDisplay("CHECK EMPTY");
        }

        function playSound(name) {
            sounds[name].currentTime = 0;
            sounds[name].play().catch(e => console.log(e));
        }
    </script>
</body>
</html>
