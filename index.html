<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gun Simulator</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a; color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .info { text-align: center; margin-bottom: 20px; }
        .ammo { font-size: 3rem; font-weight: bold; color: #007AFF; }
        .status { font-size: 1.2rem; color: #888; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; }
        button { padding: 15px; background: #333; color: white; border: 1px solid #555; border-radius: 10px; font-size: 0.8rem; }
        .active { background: #007AFF; border-color: white; }
    </style>
</head>
<body>

    <div class="info">
        <div class="ammo" id="ammo_count">10 / 10</div>
        <div class="status" id="action_label">タップして開始</div>
    </div>

    <div class="grid">
        <button onclick="setup(0, 'https://soundeffect-lab.info/sound/battle/mp3/handgun-firing1.mp3')">音1:発射</button>
        <button onclick="setup(1, 'https://soundeffect-lab.info/sound/battle/mp3/handgun-out-bullets1.mp3')">音2:リロード</button>
        <button onclick="setup(2, 'https://soundeffect-lab.info/sound/battle/mp3/handgun-ready1.mp3')">音3:構え</button>
        <button onclick="setup(3, 'https://soundeffect-lab.info/sound/battle/mp3/handgun-out-bullets1.mp3')">音4:空撃ち</button>
    </div>

    <script>
        let sounds = [new Audio(), new Audio(), new Audio(), new Audio()];
        let ammo = 10;
        let isReady = false;
        let lastTrigger = 0; // 連続検知防止用
        let mode = "READY"; // READY, DOWN, RELOADED

        async function setup(idx, url) {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            sounds[idx].src = url;
            sounds[idx].load();
            document.querySelectorAll('button')[idx].classList.add('active');
            isReady = true;
            document.getElementById('action_label').innerText = "構えてください";
        }

        window.addEventListener('deviceorientation', (event) => {
            if (!isReady) return;

            // 横持ち縦構えの場合、主に gamma (左右の傾き) が前後の動きになります
            let pitch = event.gamma; 
            let now = Date.now();
            let label = document.getElementById('action_label');
            let ammoDisp = document.getElementById('ammo_count');

            // 1. 発射検知（上にクイッ：数値が急激に上がる）
            if (pitch < -60 && now - lastTrigger > 300) {
                if (ammo > 0) {
                    playSound(0); // 発射
                    ammo--;
                    label.innerText = "BANG!";
                } else {
                    playSound(3); // 弾切れ音
                    label.innerText = "EMPTY (Reload!)";
                }
                lastTrigger = now;
                ammoDisp.innerText = ammo + " / 10";
            }

            // 2. リロード動作（スマホの先を真下に向ける）
            if (pitch > 20) {
                if (mode !== "DOWN") {
                    playSound(1); // リロード開始音
                    label.innerText = "RELOADING...";
                    mode = "DOWN";
                }
            }

            // 3. 基本の形に戻った時（水平〜構えの位置に戻る）
            if (mode === "DOWN" && pitch < -10 && pitch > -40) {
                playSound(2); // ガチャッという構え音
                ammo = 10;
                ammoDisp.innerText = ammo + " / 10";
                label.innerText = "READY";
                mode = "READY";
            }
        });

        function playSound(idx) {
            if (sounds[idx].src) {
                sounds[idx].currentTime = 0;
                sounds[idx].play().catch(e => {});
            }
        }
    </script>
</body>
</html>
