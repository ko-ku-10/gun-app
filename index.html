<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Gun Sim</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #121212; color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        .header {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .ammo { font-size: 3.5rem; font-weight: bold; color: #007AFF; }
        .mode-badge {
            padding: 5px 15px; background: #444; border-radius: 20px;
            font-size: 1rem; margin-top: 5px; text-transform: uppercase;
        }
        .controls {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 65vh; gap: 10px; padding: 15px;
        }
        button {
            border: none; border-radius: 20px; font-size: 1.2rem; font-weight: bold;
            color: white; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .btn-fire { background: #c0392b; grid-column: span 2; font-size: 2rem; }
        .btn-reload { background: #27ae60; }
        .btn-mode { background: #2980b9; }
        
        button:active { opacity: 0.7; transform: scale(0.98); }

        #overlay {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        #start_btn { padding: 20px 40px; font-size: 1.5rem; background: #007AFF; border: none; color: white; border-radius: 50px; }
    </style>
</head>
<body>

<div id="overlay">
    <button id="start_btn">SYSTEM START</button>
</div>

<div class="header">
    <div class="ammo" id="ammo_count">12 / 12</div>
    <div id="mode_display" class="mode-badge">SEMI-AUTO</div>
</div>

<div class="controls">
    <button class="btn-fire" id="fire_btn">FIRE</button>
    <button class="btn-mode" id="mode_btn">MODE CHANGE</button>
    <button class="btn-reload" id="reload_btn">RELOAD</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buffers = {};
    let ammo = 12;
    let isAuto = false;
    let isReloading = false;

    // 音声ファイルのリスト
    const soundFiles = {
        shot: 'shot.mp3',
        reload: 'reload.mp3',
        ready: 'ready.mp3',
        empty: 'empty.mp3'
    };

    // 音声を事前にデコードしてメモリに蓄える（遅延対策）
    async function loadSound(name, url) {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        buffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
    }

    // 音を鳴らす関数（Web Audio API）
    function play(name) {
        if (!buffers[name]) return;
        const source = audioCtx.createBufferSource();
        source.buffer = buffers[name];
        source.connect(audioCtx.destination);
        source.start(0);
    }

    // 初期化
    document.getElementById('start_btn').addEventListener('click', async () => {
        audioCtx.resume();
        document.getElementById('start_btn').innerText = "LOADING...";
        
        // 全音源読み込み
        await Promise.all(Object.entries(soundFiles).map(([name, url]) => loadSound(name, url)));
        
        document.getElementById('overlay').style.display = 'none';
    });

    // 発射処理
    function fire() {
        if (isReloading) return;
        if (ammo > 0) {
            play('shot');
            ammo--;
            updateUI();
        } else {
            play('empty');
        }
    }

    // 連射（フルオート）対応のイベントリスナー
    const fireBtn = document.getElementById('fire_btn');
    let autoTimer = null;

    fireBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        fire();
        if (isAuto) {
            autoTimer = setInterval(fire, 150); // 150ms間隔で連射
        }
    });

    window.addEventListener('pointerup', () => {
        if (autoTimer) {
            clearInterval(autoTimer);
            autoTimer = null;
        }
    });

    // モード切替
    document.getElementById('mode_btn').addEventListener('click', () => {
        isAuto = !isAuto;
        play('ready');
        document.getElementById('mode_display').innerText = isAuto ? "FULL-AUTO" : "SEMI-AUTO";
    });

    // リロード
    document.getElementById('reload_btn').addEventListener('click', () => {
        if (ammo === 12) return;
        isReloading = true;
        play('reload');
        setTimeout(() => {
            play('ready');
            ammo = 12;
            isReloading = false;
            updateUI();
        }, 1000); // 1秒後にリロード完了
    });

    function updateUI() {
        document.getElementById('ammo_count').innerText = ammo + " / 12";
    }
</script>
</body>
</html>
