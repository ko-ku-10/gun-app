<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gun Simulator</title>
    <style>
        body {
            margin: 0; background-color: #1a1a1a; color: white;
            font-family: sans-serif; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }
        .info { text-align: center; margin-bottom: 20px; }
        .ammo { font-size: 3rem; font-weight: bold; color: #007AFF; }
        .status { font-size: 1.2rem; color: #888; margin-top: 10px; }
        #start_btn { padding: 20px 40px; font-size: 1.5rem; background: #007AFF; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup_screen">
        <button id="start_btn">START (音を有効にする)</button>
    </div>

    <div id="app_screen" style="display: none;">
        <div class="info">
            <div class="ammo" id="ammo_count">10 / 10</div>
            <div class="status" id="action_label">構えてください</div>
        </div>
    </div>

    <script>
        // 同じ階層にアップロードしたファイル名を指定
        const soundFiles = ['shot.mp3', 'reload.mp3', 'ready.mp3', 'empty.mp3'];
        const sounds = soundFiles.map(file => new Audio(file));
        
        let ammo = 10;
        let lastTrigger = 0;
        let mode = "READY";

        document.getElementById('start_btn').addEventListener('click', async () => {
            // iOS/Androidのロック解除
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return alert('センサー許可が必要です');
            }

            // 音を一度再生して即停止（ブラウザの再生制限を解除）
            sounds.forEach(s => { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(()=>{}); });

            document.getElementById('setup_screen').style.display = 'none';
            document.getElementById('app_screen').style.display = 'block';
            initSensor();
        });

        function initSensor() {
            window.addEventListener('deviceorientation', (event) => {
                let pitch = event.gamma; 
                let now = Date.now();
                let label = document.getElementById('action_label');
                let ammoDisp = document.getElementById('ammo_count');

                // 発射：上にクイッ
                if (pitch < -60 && now - lastTrigger > 300) {
                    if (ammo > 0) {
                        playSound(0); // shot.mp3
                        ammo--;
                        label.innerText = "BANG!";
                    } else {
                        playSound(3); // empty.mp3
                        label.innerText = "EMPTY!";
                    }
                    lastTrigger = now;
                    ammoDisp.innerText = ammo + " / 10";
                }

                // リロード：下に向ける
                if (pitch > 20) {
                    if (mode !== "DOWN") {
                        playSound(1); // reload.mp3
                        label.innerText = "RELOADING...";
                        mode = "DOWN";
                    }
                }

                // 構え直し：水平に戻す
                if (mode === "DOWN" && pitch < -10 && pitch > -40) {
                    playSound(2); // ready.mp3
                    ammo = 10;
                    ammoDisp.innerText = ammo + " / 10";
                    label.innerText = "READY";
                    mode = "READY";
                }
            });
        }

        function playSound(idx) {
            sounds[idx].currentTime = 0;
            sounds[idx].play().catch(e => console.log(e));
        }
    </script>
</body>
</html>
